# DoH 测试服务器配置文件
# 格式: 域名 响应类型/IP地址
# 响应类型可以是:
#   - IPv4地址 (如 123.123.123.123)
#   - IPv6地址 (如 2001:db8::1234)
#   - NXDOMAIN (域名不存在)
#   - SERVFAIL (服务器错误)
#   - REFUSED (拒绝)
#   - NOTRESPONSE (不响应，用于超时测试)
#   - NOTRESPONSE:秒数 (等待指定秒数后不响应)

# ========== IPv4 地址配置 ==========
# 有效地址
example.com   A 123.123.123.123
foo.com       A 142.250.185.78
valid.example A 1.2.3.4

# 无效地址 (会被您的过滤器捕获)
invalid-zero.example      A 0.0.0.0
invalid-loopback.example  A 127.0.0.1
bing.com                  A 127.0.0.1
invalid-linklocal.example A 169.254.0.0
private1.example          A 10.10.10.10
private2.example          A 172.16.16.16
private3.example          A 192.168.10.10
cgnat1.example            A 100.64.64.64
testnet1.example          A 192.0.2.10
testnet2.example          A 198.51.100.1
testnet3.example          A 203.0.113.1

# ========== IPv6 地址配置 ==========
# 有效 IPv6 地址
ipv6.example1 AAAA 2011:db8::1234
ipv6.example2 AAAA 2001:4860:4860::8888
ipv6.example3 AAAA 2a03:2880:f10c:83:face:b00c:0:25de
ipv6.test     AAAA 2991:db8:85a3::8a2e:370:7334

# 无效 IPv6 地址 (会被过滤)
ipv6-loopback.example       AAAA ::1                      # 回环地址
ipv6-unspecified.example    AAAA ::                       # 未指定地址
ipv6-multicast.example      AAAA ff02::1                  # 多播地址
ipv6-ula.example            AAAA fc00::1234               # 唯一本地地址
ipv6-linklocal.example      AAAA fe80::1                  # 链路本地地址
ipv6-documentation.example1 AAAA 2001:db8::1              # 文档前缀（测试网络）
ipv6-documentation.example2 AAAA 2001:db8:1234::5678
private4.example            AAAA fd12:3456:789a::1       # 本地地址


# ========== 混合配置 ==========
# 同时支持 IPv4 和 IPv6 的域名（需要两个条目）
mixture.com CNAME mixture-cname.example
mixture.com  A    3.173.21.63
mixture.com  AAAA 2098:da8::1

# ========== 特殊响应 ==========
# 域名不存在
nxdomain.example NXDOMAIN
nonexist.example NXDOMAIN

# 服务器错误
servfail.example SERVFAIL

# 拒绝
refused.example REFUSED

# ========== 超时测试 ==========
# 不响应（超时）
not-response.com NOTRESPONSE
baidu.com NOTRESPONSE:8

# 等待指定秒数后不响应
timeout5.example NOTRESPONSE:5
timeout10.example NOTRESPONSE:10
timeout20.example NOTRESPONSE:20


